<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Map - GitHub Pages</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { height: 100%; margin: 0; padding: 0; }
body { font-family: sans-serif; }
#map { height: 90vh; width: 100%; }
#inputContainer { padding: 10px; background: #f5f5f5; display: flex; gap: 10px; }
input[type="text"] { flex: 1; padding: 5px; }
button { padding: 5px 10px; }
</style>
</head>
<body>

<div id="inputContainer">
  <input type="text" id="locationInput" placeholder="Enter city name">
  <button id="addButton">Add Location</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([20,0], 2);

// OpenStreetMap tile layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Load saved bubbles
let bubbles = JSON.parse(localStorage.getItem('bubbles')) || {};
let bubbleLayers = [];

// Random color generator
function getRandomColor() {
  return '#' + Math.floor(Math.random()*16777215).toString(16);
}

// Save bubbles
function saveBubbles() {
  localStorage.setItem('bubbles', JSON.stringify(bubbles));
}

// Render bubbles
function renderBubbles() {
  bubbleLayers.forEach(layer => map.removeLayer(layer));
  bubbleLayers = [];

  for (const key in bubbles) {
    const b = bubbles[key];
    const circle = L.circleMarker([b.lat, b.lon], {
      radius: 5 + b.count * 3,
      color: 'black',
      weight: 2,
      fillColor: b.color,
      fillOpacity: 0.7
    }).addTo(map);
    bubbleLayers.push(circle);
  }
}

// Add bubble by coordinates
function addBubble(lat, lon) {
  const key = lat.toFixed(5) + ',' + lon.toFixed(5);
  if (!bubbles[key]) {
    bubbles[key] = {lat, lon, count: 1, color: getRandomColor()};
  } else {
    bubbles[key].count += 1;
  }
  saveBubbles();
  renderBubbles();
}

// Geocode city name using OpenStreetMap Nominatim
async function geocode(city) {
  try {
    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
    const data = await response.json();
    if (data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    alert("City not found!");
    return null;
  } catch (e) {
    alert("Geocoding failed!");
    return null;
  }
}

// Handle add button
document.getElementById('addButton').addEventListener('click', async () => {
  const input = document.getElementById('locationInput');
  const city = input.value.trim();
  if (!city) return;
  const coords = await geocode(city);
  if (coords) addBubble(coords[0], coords[1]);
  input.value = '';
});

// Render saved bubbles on load
renderBubbles();
</script>

</body>
</html>
